<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>リッチ投稿ツール</title>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  :root{
    color-scheme: light dark;
    --bg:#f4f5f7; --card:#ffffff; --text:#1b1b1f; --muted:#6b7280;
    --accent:#06c755; --accent-dark:#04a344; --border:#e2e4e8;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#14151a; --card:#1e2027; --text:#eef0f3; --muted:#9aa0ab; --border:#2c2f38; }
  }
  *{box-sizing:border-box;}
  body{
    margin:0; padding:16px; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Segoe UI",Roboto,sans-serif;
    max-width:520px; margin-inline:auto;
  }
  h1{font-size:18px; margin:4px 0 12px;}
  section{background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:16px;}
  label{display:block; font-size:12px; color:var(--muted); margin:12px 0 4px;}
  label:first-child{margin-top:0;}
  input[type=text], input[type=url], textarea{
    width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:10px;
    background:var(--bg); color:var(--text); font-size:14px; font-family:inherit;
  }
  textarea#jsonInput{
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; font-size:12px;
    min-height:150px; white-space:pre; resize:vertical;
  }
  #sendBtn{
    appearance:none; border:none; border-radius:12px; padding:15px; font-size:16px; width:100%;
    font-weight:700; cursor:pointer; color:#fff; background:var(--accent); margin-top:4px;
  }
  #sendBtn:disabled{opacity:.4; cursor:not-allowed;}
  .button-editor{border:1px solid var(--border); border-radius:10px; padding:10px 12px; margin-bottom:8px;}
  .button-editor .be-name{font-size:12px; color:var(--muted); margin-bottom:4px;}
  #status{font-size:13px; padding:10px 12px; border-radius:10px; margin-bottom:12px; display:none;}
  #status.ok{display:block; background:#06c75522; color:var(--accent-dark);}
  #status.err{display:block; background:#e5484d22; color:#e5484d;}
  #status.info{display:block; background:#3b82f622; color:#3b82f6;}
  .preview{border:1px solid var(--border); border-radius:12px; overflow:hidden; background:var(--bg);}
  .preview img{width:100%; display:block; max-height:220px; object-fit:cover;}
  .preview-body{padding:14px;}
  .preview-title{font-weight:700; font-size:15px; margin:0 0 6px;}
  .preview-text{font-size:13px; color:var(--muted); white-space:pre-wrap; margin:0 0 4px;}
  .preview-buttons a{
    display:block; text-align:center; padding:11px; font-size:13px; font-weight:600;
    color:var(--accent-dark); text-decoration:none; border-top:1px solid var(--border);
  }
  h2{font-size:13px; margin:0 0 10px; color:var(--muted); font-weight:600;}
</style>
</head>
<body>

<h1>リッチ投稿ツール</h1>
<div id="status"></div>

<section>
  <label for="jsonInput">Flex MessageのJSON</label>
  <textarea id="jsonInput" placeholder='ここにFlex MessageのJSONを貼り付け'></textarea>

  <div id="buttonEditors"></div>

  <button id="sendBtn" disabled>このトークに送信</button>
</section>

<section id="previewSection" style="display:none;">
  <h2>プレビュー</h2>
  <div class="preview" id="previewCard"></div>
</section>

<script>
const LIFF_ID = '2006439463-vBCAM0Fz';

const $ = (id) => document.getElementById(id);
const statusEl = $('status');
function showStatus(msg, type){ statusEl.textContent = msg; statusEl.className = type; }

let loadedMessages = null;
let ready = false;

// action.type === 'uri' を再帰的に探す
function findUriActions(node, out){
  if (Array.isArray(node)){ node.forEach(n => findUriActions(n, out)); return out; }
  if (node && typeof node === 'object'){
    if (node.type === 'uri' && typeof node.uri === 'string') out.push(node);
    for (const k of Object.keys(node)) findUriActions(node[k], out);
  }
  return out;
}
function collectTexts(node, out){
  if (Array.isArray(node)){ node.forEach(n => collectTexts(n, out)); return; }
  if (node && typeof node === 'object'){
    if (node.type === 'text' && typeof node.text === 'string') out.push(node.text);
    if (node.contents) collectTexts(node.contents, out);
  }
}
function collectButtons(node, out){
  if (Array.isArray(node)){ node.forEach(n => collectButtons(n, out)); return; }
  if (node && typeof node === 'object'){
    if (node.type === 'button' && node.action) out.push(node.action);
    if (node.contents) collectButtons(node.contents, out);
  }
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderButtonEditors(){
  const box = $('buttonEditors');
  box.innerHTML = '';
  const actions = findUriActions(loadedMessages, []);
  actions.forEach((action, i) => {
    const el = document.createElement('div');
    el.className = 'button-editor';
    el.innerHTML = `
      <div class="be-name">ボタン${i+1}のリンク先URL${action.label ? '（' + escapeHtml(action.label) + '）' : ''}</div>
      <input type="url" value="${escapeHtml(action.uri || '')}">
    `;
    el.querySelector('input').addEventListener('input', (e) => {
      action.uri = e.target.value;
      $('jsonInput').value = JSON.stringify(loadedMessages.length === 1 ? loadedMessages[0] : loadedMessages, null, 2);
      renderPreview();
    });
    box.appendChild(el);
  });
}

function renderPreview(){
  if (!loadedMessages){ $('previewSection').style.display = 'none'; return; }
  let html = '';
  loadedMessages.forEach(msg => {
    if (msg.type !== 'flex' || !msg.contents){
      html += `<div class="preview-body"><p class="preview-text">${escapeHtml(msg.type || '?')}メッセージ</p></div>`;
      return;
    }
    const bubble = msg.contents.type === 'carousel' ? (msg.contents.contents || [])[0] : msg.contents;
    if (!bubble) return;
    const image = bubble.hero && bubble.hero.type === 'image' ? bubble.hero.url : null;
    const texts = []; collectTexts(bubble.body, texts);
    const buttons = []; collectButtons(bubble.footer, buttons);
    if (image) html += `<img src="${escapeHtml(image)}" alt="">`;
    html += `<div class="preview-body">`;
    texts.slice(0,5).forEach((t,i) => html += `<p class="${i===0?'preview-title':'preview-text'}">${escapeHtml(t)}</p>`);
    html += `</div>`;
    if (buttons.length){
      html += `<div class="preview-buttons">`;
      buttons.forEach(a => html += `<a href="${escapeHtml(a.uri||'#')}" target="_blank" rel="noopener">${escapeHtml(a.label||'リンク')}</a>`);
      html += `</div>`;
    }
  });
  $('previewCard').innerHTML = html;
  $('previewSection').style.display = 'block';
}

// 貼り付け／編集のたびにパースしてプレビューとボタン欄を更新
$('jsonInput').addEventListener('input', () => {
  const text = $('jsonInput').value.trim();
  if (!text){ loadedMessages = null; $('buttonEditors').innerHTML=''; renderPreview(); updateSendBtn(); return; }
  try{
    const parsed = JSON.parse(text);
    loadedMessages = Array.isArray(parsed) ? parsed : [parsed];
    renderButtonEditors();
    renderPreview();
    showStatus('', '');
  }catch(e){
    loadedMessages = null;
    $('buttonEditors').innerHTML = '';
    $('previewSection').style.display = 'none';
    showStatus('JSONの形式が正しくありません', 'err');
  }
  updateSendBtn();
});

function updateSendBtn(){
  $('sendBtn').disabled = !(ready && loadedMessages);
}

$('sendBtn').addEventListener('click', async () => {
  if (!loadedMessages) return;
  try{
    await liff.sendMessages(loadedMessages);
    showStatus('このトークに送信しました。', 'ok');
  }catch(e){
    showStatus('送信に失敗しました: ' + e.message, 'err');
  }
});

(async function boot(){
  try{
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()){ liff.login(); return; }
    if (!liff.isApiAvailable('sendMessages')){
      showStatus('このトークには送信できません。送りたいオプチャ・トークの中に貼ったこのページのリンクを、そのトークの中からタップして開いてください。', 'info');
    }else{
      ready = true;
      showStatus('準備完了。JSONを貼り付けて送信してください。', 'ok');
    }
    updateSendBtn();
  }catch(e){
    showStatus('初期化に失敗しました: ' + e.message, 'err');
  }
})();
</script>
</body>
</html>
